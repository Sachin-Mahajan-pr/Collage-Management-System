{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{page_title}}{% endblock page_title %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <div class="card card-dark shadow-2xl" id="add-activity-card" style="border-radius: 20px; border: none; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <div class="card-header" style="background: linear-gradient(to right, #4f46e5, #7c3aed); border-radius: 20px 20px 0 0;">
                        <h3 class="card-title font-weight-bold text-white"><i class="fas fa-skating mr-2"></i> Register New Activity</h3>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="card-body p-4">
                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label class="text-white-50 small">ACTIVITY NAME</label>
                                    <input type="text" name="name" class="form-control custom-input" placeholder="e.g. Annual Sports Meet" required>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label class="text-white-50 small">HEAD IN-CHARGE</label>
                                    <input type="text" name="head_name" class="form-control custom-input" placeholder="e.g. Prof. John Doe" required>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-md-4 form-group">
                                    <label class="text-white-50 small">SCHEDULED DATE</label>
                                    <input type="date" name="date" class="form-control custom-input" required>
                                </div>
                                <div class="col-md-8 form-group">
                                    <label class="text-white-50 small">DESCRIPTION</label>
                                    <textarea name="description" rows="1" class="form-control custom-input" placeholder="Briefly describe the activity..." required></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-top border-white-10 d-flex justify-content-end p-4">
                            <a href="{% url 'manage_activity' %}" class="btn btn-outline-light px-4 py-2 font-weight-bold mr-3" style="border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-primary px-5 py-2 font-weight-bold shadow-lg" style="border-radius: 30px; background: #6366f1; border: none; transition: 0.3s transform;">
                                <i class="fas fa-plus-circle mr-2"></i> Create Activity
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .custom-input { background: rgba(51, 65, 85, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #fff !important; border-radius: 12px; padding: 12px; }
    .custom-input:focus { border-color: #6366f1 !important; background: rgba(51, 65, 85, 0.7) !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    #add-activity-card:hover { transform: scale(1.002); transition: 0.4s ease; }
    label { letter-spacing: 1px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
    .btn-primary:hover { transform: translateY(-3px) scale(1.05); background: #4f46e5; }
    .btn-outline-light:hover { background: rgba(255,255,255,0.1); }
</style>
{% endblock content %}
